<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificateur repas famille</title>
<style>
:root{
  --font-sans:system-ui,-apple-system,sans-serif;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f2;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#6b6b66;
  --color-text-tertiary:#9c9a92;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.2);
  --color-border-primary:rgba(0,0,0,0.35);
  --color-border-info:#378ADD;
  --color-background-info:#E6F1FB;
  --color-text-info:#185FA5;
  --color-text-danger:#A32D2D;
  --color-text-success:#3B6D11;
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1e1e1c;
    --color-background-secondary:#2a2a28;
    --color-text-primary:#e8e6de;
    --color-text-secondary:#9c9a92;
    --color-text-tertiary:#6b6b66;
    --color-border-tertiary:rgba(255,255,255,0.1);
    --color-border-secondary:rgba(255,255,255,0.18);
    --color-border-primary:rgba(255,255,255,0.3);
    --color-background-info:#0c2d4a;
    --color-text-info:#85B7EB;
    --color-text-danger:#F09595;
    --color-text-success:#C0DD97;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);padding:1.25rem;max-width:900px;margin:0 auto}
.app{padding:1rem 0}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 14px;cursor:pointer;font-size:14px;color:var(--color-text-secondary);margin-bottom:-1px;font-family:var(--font-sans)}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.tab:hover:not(.active){color:var(--color-text-primary)}
.view{display:none}.view.active{display:block}

/* PLANNING */
.week-nav{display:flex;align-items:center;gap:8px}
.week-label{font-size:14px;font-weight:500;color:var(--color-text-primary);min-width:110px;text-align:center}
.nav-btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 10px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);font-family:var(--font-sans)}
.nav-btn:hover{background:var(--color-background-secondary)}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.grid{display:grid;grid-template-columns:52px repeat(7,1fr);gap:5px}
.day-header{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px 4px;text-align:center;border:0.5px solid var(--color-border-tertiary)}
.day-header.today{border-color:var(--color-border-info);background:var(--color-background-info)}
.day-header.today .day-name{color:var(--color-text-info)}
.day-name{font-size:11px;font-weight:500;color:var(--color-text-primary)}
.day-date{font-size:10px;color:var(--color-text-tertiary);margin-top:1px}
.slot-label{display:flex;align-items:center;justify-content:flex-end;padding-right:5px}
.slot-label span{font-size:10px;color:var(--color-text-tertiary);text-align:right}
.meal-cell{min-height:64px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:5px;cursor:pointer;display:flex;flex-direction:column;gap:2px;background:var(--color-background-primary)}
.meal-cell:hover{border-color:var(--color-border-primary)}
.meal-cell.empty{background:var(--color-background-secondary);border-style:dashed}
.meal-cell.disabled{background:none;border:none;cursor:default;pointer-events:none;min-height:64px}
.meal-tag{font-size:10px;padding:1px 5px;border-radius:20px;display:inline-block;width:fit-content;font-weight:500}
.tag-vege{background:#EAF3DE;color:#3B6D11}
.tag-poulet{background:#FAEEDA;color:#633806}
.tag-porc{background:#FAEEDA;color:#633806}
.tag-boeuf{background:#FCEBEB;color:#791F1F}
.tag-poisson{background:#E6F1FB;color:#0C447C}
.meal-name{font-size:11px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.meal-time{font-size:10px;color:var(--color-text-tertiary)}
.add-icon{font-size:16px;color:var(--color-text-tertiary);margin:auto}

/* RECETTES */
.search-input{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 10px;font-size:13px;width:180px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--color-text-secondary);font-family:var(--font-sans)}
.filter-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.recipe-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;transition:border-color 0.15s;cursor:pointer}
.recipe-card:hover{border-color:var(--color-border-secondary)}
.rc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.rc-name{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.rc-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px}
.rc-time{font-size:11px;color:var(--color-text-tertiary)}
.rc-tm{font-size:10px;padding:1px 5px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary)}
.rc-ings{font-size:11px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:8px}
.rc-actions{display:flex;gap:6px;flex-wrap:wrap}
.rc-btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 8px;cursor:pointer;font-size:11px;color:var(--color-text-secondary);font-family:var(--font-sans)}
.rc-btn:hover{background:var(--color-background-secondary)}
.rc-btn-plan{background:none;border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-md);padding:4px 8px;cursor:pointer;font-size:11px;color:var(--color-text-info);font-family:var(--font-sans)}
.rc-btn-plan:hover{background:var(--color-background-info)}

/* FORM AJOUT */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:0.75rem}
.form-row.single{grid-template-columns:1fr}
.form-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.form-input,.form-select{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 10px;font-size:13px;width:100%;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--color-border-primary)}
.form-textarea{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 10px;font-size:13px;width:100%;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);min-height:90px;resize:vertical;line-height:1.5}
.form-textarea:focus{outline:none;border-color:var(--color-border-primary)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);padding:7px 16px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.btn-primary:hover{opacity:0.85}
.btn-cancel{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 16px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);font-family:var(--font-sans)}
.btn-cancel:hover{background:var(--color-background-secondary)}
.custom-badge{font-size:9px;padding:1px 4px;border-radius:4px;background:var(--color-background-info);color:var(--color-text-info);vertical-align:middle;margin-left:4px}

/* COURSES */
.courses-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.btn-sm{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 12px;cursor:pointer;font-size:12px;color:var(--color-text-secondary);font-family:var(--font-sans)}
.btn-sm:hover{background:var(--color-background-secondary)}
.btn-sm.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-sm.danger{color:var(--color-text-danger)}
.btn-sm.danger:hover{background:#FCEBEB}
.empty-state{text-align:center;padding:2rem;color:var(--color-text-tertiary);font-size:13px}
.cat-section{margin-bottom:1rem}
.cat-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;padding-bottom:4px;border-bottom:0.5px solid var(--color-border-tertiary)}
.course-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.course-item:last-child{border-bottom:none}
.course-check{width:16px;height:16px;border:0.5px solid var(--color-border-secondary);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;user-select:none}
.course-check.checked{background:var(--color-text-primary);border-color:var(--color-text-primary);color:var(--color-background-primary)}
.course-name{font-size:13px;color:var(--color-text-primary);flex:1}
.course-name.checked{text-decoration:line-through;color:var(--color-text-tertiary)}
.course-qty{font-size:12px;color:var(--color-text-secondary);text-align:right;min-width:80px}
.course-qty.checked{color:var(--color-text-tertiary)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem;width:340px;max-width:92vw;max-height:84vh;overflow-y:auto}
.modal-wide{width:480px}
.modal h3{font-size:15px;font-weight:500;margin-bottom:0.75rem;color:var(--color-text-primary)}
.modal-subtitle{font-size:12px;color:var(--color-text-tertiary);margin-bottom:0.75rem}
.sug-btn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:7px 10px;text-align:left;cursor:pointer;font-size:12px;color:var(--color-text-primary);display:flex;align-items:center;gap:6px;width:100%;margin-bottom:5px;font-family:var(--font-sans)}
.sug-btn:hover{border-color:var(--color-border-primary);background:var(--color-background-primary)}
.modal-search{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 10px;font-size:13px;width:100%;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);margin-bottom:0.75rem}
.modal-search:focus{outline:none;border-color:var(--color-border-primary)}
.modal-section{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin:10px 0 6px}
.modal-close{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 14px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);width:100%;margin-top:10px;font-family:var(--font-sans)}
.modal-close:hover{background:var(--color-background-secondary)}

/* CHECKBOX COURSES DANS MODAL PLAN */
.plan-courses-row{display:flex;align-items:center;gap:8px;padding:8px 0 4px;border-top:0.5px solid var(--color-border-tertiary);margin-top:8px}
.plan-courses-cb{width:15px;height:15px;accent-color:var(--color-text-primary);cursor:pointer;flex-shrink:0}
.plan-courses-label{font-size:12px;color:var(--color-text-secondary);cursor:pointer}

/* DETAIL RECETTE */
.detail-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.detail-section-title{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin:0.75rem 0 0.4rem}
.detail-ing-cat{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin:0.5rem 0 0.25rem}
.detail-ing-list{list-style:none;padding:0}
.detail-ing-list li{font-size:13px;color:var(--color-text-primary);padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between}
.detail-ing-list li:last-child{border-bottom:none}
.ing-qty{color:var(--color-text-secondary);font-size:12px}
.detail-steps{list-style:none;padding:0;counter-reset:steps}
.detail-steps li{counter-increment:steps;font-size:13px;color:var(--color-text-primary);padding:7px 0 7px 30px;border-bottom:0.5px solid var(--color-border-tertiary);position:relative;line-height:1.5}
.detail-steps li:last-child{border-bottom:none}
.detail-steps li::before{content:counter(steps);position:absolute;left:0;top:8px;width:20px;height:20px;background:var(--color-background-secondary);border-radius:50%;font-size:10px;font-weight:500;color:var(--color-text-secondary);text-align:center;line-height:20px}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:0.75rem;padding-top:0.75rem;border-top:0.5px solid var(--color-border-tertiary)}
.cookidoo-link{display:inline-flex;align-items:center;gap:4px;background:none;border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-md);padding:4px 10px;font-size:11px;color:var(--color-text-info);text-decoration:none;font-family:var(--font-sans)}
.cookidoo-link:hover{background:var(--color-background-info)}
</style>
</head>
<body>
<div class="app">
<div class="tabs">
  <button class="tab active" onclick="switchTab('planning')">Planning</button>
  <button class="tab" onclick="switchTab('recettes')">Recettes</button>
  <button class="tab" onclick="switchTab('courses')">Liste de courses <span id="courses-badge"></span></button>
</div>

<!-- PLANNING -->
<div class="view active" id="view-planning">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:0.75rem">
    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)">←</button>
      <span class="week-label" id="week-label">Semaine</span>
      <button class="nav-btn" onclick="changeWeek(1)">→</button>
    </div>
    <div class="legend">
      <div class="leg"><div class="dot" style="background:#639922"></div>Végé</div>
      <div class="leg"><div class="dot" style="background:#BA7517"></div>Volaille/porc</div>
      <div class="leg"><div class="dot" style="background:#E24B4A"></div>Bœuf</div>
      <div class="leg"><div class="dot" style="background:#378ADD"></div>Poisson</div>
    </div>
  </div>
  <div class="grid" id="meal-grid"></div>
</div>

<!-- RECETTES -->
<div class="view" id="view-recettes">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-wrap:wrap;gap:8px">
    <input class="search-input" type="text" placeholder="Rechercher…" oninput="filterRecipes(this.value)">
    <button class="rc-btn" id="add-toggle-btn" onclick="toggleAddForm()">+ Ajouter une recette</button>
  </div>
  <!-- FORMULAIRE AJOUT -->
  <div id="add-recipe-form" style="display:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;background:var(--color-background-secondary)">
    <div style="font-size:13px;font-weight:500;margin-bottom:0.75rem">Nouvelle recette</div>
    <div class="form-row">
      <div><div class="form-label">Nom *</div><input class="form-input" id="f-name" type="text" placeholder="Ex : Poulet basquaise"></div>
      <div><div class="form-label">Type *</div>
        <select class="form-select" id="f-tag">
          <option value="vege">Végé</option><option value="poulet">Volaille</option>
          <option value="porc">Porc</option><option value="boeuf">Bœuf</option><option value="poisson">Poisson</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><div class="form-label">Temps (min) *</div><input class="form-input" id="f-time" type="number" min="5" placeholder="30"></div>
      <div><div class="form-label">Thermomix TM6 ?</div>
        <select class="form-select" id="f-tm"><option value="0">Non</option><option value="1">Oui</option></select>
      </div>
    </div>
    <div class="form-row single" style="margin-top:6px">
      <div><div class="form-label">Lien Cookidoo (optionnel)</div><input class="form-input" id="f-cookidoo" type="url" placeholder="https://cookidoo.fr/recipes/..."></div>
    </div>
    <div class="form-row single" style="margin-top:6px">
      <div>
        <div class="form-label">Ingrédients * — un par ligne, format : Nom — quantité</div>
        <textarea class="form-textarea" id="f-ings" placeholder="Carottes — 3&#10;Poulet bio — 600 g&#10;Huile olive — 2 c.à.s"></textarea>
      </div>
    </div>
    <div class="form-row single" style="margin-top:6px">
      <div>
        <div class="form-label">Étapes (optionnel) — une par ligne</div>
        <textarea class="form-textarea" id="f-steps" placeholder="Éplucher et couper les légumes.&#10;Faire revenir 5 min.&#10;Mijoter 20 min."></textarea>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:0.75rem">
      <button class="btn-primary" onclick="saveNewRecipe()">Enregistrer</button>
      <button class="btn-cancel" onclick="toggleAddForm()">Annuler</button>
    </div>
    <div id="f-error" style="font-size:12px;color:var(--color-text-danger);margin-top:6px;display:none"></div>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('tous',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('vege',this)">Végé</button>
    <button class="filter-btn" onclick="setFilter('poulet',this)">Volaille</button>
    <button class="filter-btn" onclick="setFilter('porc',this)">Porc</button>
    <button class="filter-btn" onclick="setFilter('poisson',this)">Poisson</button>
    <button class="filter-btn" onclick="setFilter('thermomix',this)">TM6</button>
    <button class="filter-btn" onclick="setFilter('rapide',this)">Rapide (&lt;25min)</button>
  </div>
  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<!-- COURSES -->
<div class="view" id="view-courses">
  <div class="courses-header">
    <div style="font-size:13px;color:var(--color-text-secondary)" id="courses-subtitle"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn-sm active" id="btn-group-cat" onclick="setGroupMode('cat')">Par catégorie</button>
      <button class="btn-sm" id="btn-group-rec" onclick="setGroupMode('recette')">Par recette</button>
      <button class="btn-sm" onclick="clearChecked()">Effacer cochés</button>
      <button class="btn-sm danger" onclick="resetCourses()">Réinitialiser</button>
    </div>
  </div>
  <div id="courses-list"></div>
</div>
</div>

<!-- MODAL DÉTAIL RECETTE -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal modal-wide">
    <h3 id="mdet-title"></h3>
    <div id="mdet-body"></div>
    <button class="modal-close" onclick="closeDetailModal()">Fermer</button>
  </div>
</div>

<!-- MODAL PLANIFIER (depuis recette) -->
<div class="modal-overlay" id="modal-plan">
  <div class="modal">
    <h3 id="mplan-title">Planifier cette recette</h3>
    <div class="modal-subtitle">Choisissez un créneau</div>
    <div id="mplan-body"></div>
    <button class="modal-close" onclick="closePlanModal()">Fermer</button>
  </div>
</div>

<!-- MODAL CHOISIR + CHERCHER RECETTE (depuis planning cell vide) -->
<div class="modal-overlay" id="modal-recipe">
  <div class="modal">
    <h3 id="mrec-title"></h3>
    <input class="modal-search" id="mrec-search" type="text" placeholder="Rechercher une recette…" oninput="filterModalRecipes(this.value)">
    <div id="mrec-body"></div>
    <button class="modal-close" onclick="closeRecipeModal()">Fermer</button>
  </div>
</div>

<script>
const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const DAYS_FULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const TAG_LABELS={vege:'Végé',poulet:'Volaille',porc:'Porc',boeuf:'Bœuf',poisson:'Poisson'};

function hasSlot(d,s){
  if(s==='soir')return true;
  if(s==='midi')return d===5||d===6;
  return false;
}

const RECIPES_BASE=[

let customRecipes=[];
let nextId=100;
function getAllRecipes(){return[...RECIPES_BASE,...customRecipes];}

const CAT_LABELS={proteines:'Protéines & produits frais',legumes:'Fruits & légumes',legumineuses:'Légumineuses',feculents:'Féculents & céréales',epicerie:'Épicerie',laitiers:'Produits laitiers'};
const CAT_ORDER=['proteines','legumes','legumineuses','feculents','laitiers','epicerie'];

let weekOffset=0,meals={},checked={},recipeFilter='tous',recipeSearch='',manualList=[],pendingRecipe=null;
let groupMode='cat'; // 'cat' ou 'recette'
let currentPlanCell=null; // {dayIdx, slot} pour la modal de sélection depuis planning

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['planning','recettes','courses'][i]===t));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+t).classList.add('active');
  if(t==='courses')renderCourses();
}

// ── PLANNING ─────────────────────────────────────────────────────────────────
function getMonday(off){const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(new Date(d).setDate(diff+off*7));}
function weekNum(d){const j=new Date(d.getFullYear(),0,1);return Math.ceil((((d-j)/86400000)+j.getDay()+1)/7);}
function changeWeek(dir){weekOffset+=dir;renderGrid();}
function getMeal(d,s){const k='w'+weekOffset;return meals[k]&&meals[k][d]&&meals[k][d][s]||null;}
function setMeal(d,s,r){const k='w'+weekOffset;if(!meals[k])meals[k]={};if(!meals[k][d])meals[k][d]={};meals[k][d][s]=r;}

function makeCell(dayIdx,slot){
  const cell=document.createElement('div');
  if(!hasSlot(dayIdx,slot)){cell.className='meal-cell disabled';return cell;}
  const meal=getMeal(dayIdx,slot);
  cell.className='meal-cell'+(meal?'':' empty');
  if(meal){
    cell.innerHTML='<span class="meal-tag tag-'+meal.tag+'">'+meal.tagLabel+'</span>'+
      '<span class="meal-name">'+meal.name+'</span>'+
      '<span class="meal-time">'+meal.time+' min'+(meal.thermomix?' · TM':'')+'</span>';
    // Clic sur cellule remplie → détail recette avec option changer/effacer
    cell.onclick=()=>openCellDetailModal(dayIdx,slot);
  } else {
    cell.innerHTML='<span class="add-icon">+</span>';
    // Clic sur cellule vide → choisir recette
    cell.onclick=()=>openRecipeModal(dayIdx,slot);
  }
  return cell;
}

function renderGrid(){
  const mon=getMonday(weekOffset);
  document.getElementById('week-label').textContent='Sem. '+weekNum(mon);
  const grid=document.getElementById('meal-grid');
  grid.innerHTML='';
  const today=new Date();
  grid.appendChild(document.createElement('div'));
  for(let d=0;d<7;d++){
    const date=new Date(mon);date.setDate(mon.getDate()+d);
    const isTod=date.toDateString()===today.toDateString();
    const h=document.createElement('div');
    h.className='day-header'+(isTod?' today':'');
    h.innerHTML='<div class="day-name">'+DAYS[d]+'</div><div class="day-date">'+date.getDate()+'/'+(date.getMonth()+1)+'</div>';
    grid.appendChild(h);
  }
  const lblMidi=document.createElement('div');lblMidi.className='slot-label';lblMidi.innerHTML='<span>Midi</span>';
  grid.appendChild(lblMidi);
  for(let d=0;d<7;d++)grid.appendChild(makeCell(d,'midi'));
  const lblSoir=document.createElement('div');lblSoir.className='slot-label';lblSoir.innerHTML='<span>Soir</span>';
  grid.appendChild(lblSoir);
  for(let d=0;d<7;d++)grid.appendChild(makeCell(d,'soir'));
  updateCoursesBadge();
}

// ── MODAL : cellule remplie → détail + options changer/effacer ───────────────
function openCellDetailModal(dayIdx,slot){
  const meal=getMeal(dayIdx,slot);
  if(!meal)return;
  const r=getAllRecipes().find(x=>x.id===meal.id)||meal;
  document.getElementById('mdet-title').textContent=r.name;
  const body=document.getElementById('mdet-body');
  let html=buildDetailHTML(r);
  // Boutons spécifiques : changer la recette, effacer
  html+='<div class="detail-actions" style="flex-wrap:wrap">'+
    '<button class="rc-btn-plan" onclick="closeDetailModal();openRecipeModal('+dayIdx+',\''+slot+'\')">Changer la recette</button>'+
    '<button class="rc-btn" style="color:var(--color-text-danger)" onclick="setMeal('+dayIdx+',\''+slot+'\',null);closeDetailModal();renderGrid();">✕ Effacer</button>'+
    (r.cookidoo?'<a class="cookidoo-link" href="'+r.cookidoo+'" target="_blank">Cookidoo ↗</a>':'')+
    '</div>';
  body.innerHTML=html;
  document.getElementById('modal-detail').classList.add('open');
}

// ── MODAL : choisir recette depuis planning (cellule vide) ────────────────────
let modalRecipeDayIdx=null,modalRecipeSlot=null;
function openRecipeModal(dayIdx,slot){
  modalRecipeDayIdx=dayIdx;modalRecipeSlot=slot;
  document.getElementById('mrec-title').textContent=DAYS_FULL[dayIdx]+' — '+(slot==='midi'?'Midi':'Soir');
  document.getElementById('mrec-search').value='';
  populateRecipeModal('');
  document.getElementById('modal-recipe').classList.add('open');
}
function filterModalRecipes(q){populateRecipeModal(q.toLowerCase());}
function populateRecipeModal(q){
  const body=document.getElementById('mrec-body');body.innerHTML='';
  const filtered=getAllRecipes().filter(r=>!q||r.name.toLowerCase().includes(q));
  filtered.forEach(r=>{
    const btn=document.createElement('button');btn.className='sug-btn';
    btn.innerHTML='<span class="meal-tag tag-'+r.tag+'" style="font-size:10px;padding:1px 5px;border-radius:10px">'+r.tagLabel+'</span>'+
      '<span style="flex:1">'+r.name+'</span>'+
      '<span style="font-size:10px;color:var(--color-text-tertiary)">'+r.time+'min'+(r.thermomix?' · TM':'')+' </span>';
    btn.onclick=()=>{setMeal(modalRecipeDayIdx,modalRecipeSlot,r);closeRecipeModal();renderGrid();};
    body.appendChild(btn);
  });
  if(!filtered.length){body.innerHTML='<div style="font-size:12px;color:var(--color-text-tertiary);padding:8px 0">Aucune recette trouvée.</div>';}
}
function closeRecipeModal(){document.getElementById('modal-recipe').classList.remove('open');modalRecipeDayIdx=null;modalRecipeSlot=null;}

// ── MODAL : détail recette (depuis onglet recettes) ──────────────────────────
function buildDetailHTML(r){
  let html='<div class="detail-meta">'+
    '<span class="meal-tag tag-'+r.tag+'">'+r.tagLabel+'</span>'+
    '<span style="font-size:12px;color:var(--color-text-tertiary)">'+r.time+' min</span>'+
    (r.thermomix?'<span style="font-size:11px;padding:1px 6px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary)">TM6</span>':'')+
    (r.custom?'<span style="font-size:11px;padding:1px 6px;border-radius:10px;background:var(--color-background-info);color:var(--color-text-info)">Ma recette</span>':'')+
    '</div>';
  html+='<div class="detail-section-title">Ingrédients</div>';
  CAT_ORDER.forEach(cat=>{
    if(!r.ings[cat])return;
    html+='<div class="detail-ing-cat">'+(CAT_LABELS[cat]||cat)+'</div><ul class="detail-ing-list">';
    r.ings[cat].forEach(item=>{
      const parts=item.split(' — ');
      html+='<li><span>'+parts[0]+'</span><span class="ing-qty">'+(parts[1]||'')+'</span></li>';
    });
    html+='</ul>';
  });
  if(r.steps&&r.steps.length){
    html+='<div class="detail-section-title">Préparation</div><ol class="detail-steps">';
    r.steps.forEach(s=>{html+='<li>'+s+'</li>';});
    html+='</ol>';
  }
  return html;
}
function openDetailModal(id){
  const r=getAllRecipes().find(x=>x.id===id);if(!r)return;
  document.getElementById('mdet-title').textContent=r.name;
  let html=buildDetailHTML(r);
  html+='<div class="detail-actions">'+
    '<button class="rc-btn-plan" onclick="closeThenPlan('+r.id+')">+ Planifier</button>'+
    '<button class="rc-btn" onclick="closeThenCourses('+r.id+')">+ Courses</button>'+
    (r.cookidoo?'<a class="cookidoo-link" href="'+r.cookidoo+'" target="_blank">Ouvrir dans Cookidoo ↗</a>':'')+
    '</div>';
  document.getElementById('mdet-body').innerHTML=html;
  document.getElementById('modal-detail').classList.add('open');
}
function closeDetailModal(){document.getElementById('modal-detail').classList.remove('open');}
function closeThenPlan(id){closeDetailModal();openPlanModal(getAllRecipes().find(r=>r.id===id));}
function closeThenCourses(id){closeDetailModal();addToList(id);}

// ── MODAL : planifier depuis recettes (avec checkbox courses) ─────────────────
function openPlanModal(recipe){
  pendingRecipe=recipe;
  document.getElementById('mplan-title').textContent='Planifier : '+recipe.name;
  const body=document.getElementById('mplan-body');body.innerHTML='';

  // Checkbox "ajouter aux courses"
  const cbRow=document.createElement('div');cbRow.className='plan-courses-row';
  cbRow.innerHTML='<input type="checkbox" id="plan-cb-courses" class="plan-courses-cb" checked>'+
    '<label for="plan-cb-courses" class="plan-courses-label">Ajouter les ingrédients à la liste de courses</label>';
  body.appendChild(cbRow);

  for(let wo=weekOffset;wo<=weekOffset+1;wo++){
    const secLabel=document.createElement('div');secLabel.className='modal-section';
    secLabel.textContent=wo===weekOffset?'Cette semaine':'Semaine suivante';
    body.appendChild(secLabel);
    ['midi','soir'].forEach(slot=>{
      for(let d=0;d<7;d++){
        if(!hasSlot(d,slot))return;
        const existing=(meals['w'+wo]&&meals['w'+wo][d]&&meals['w'+wo][d][slot])||null;
        const btn=document.createElement('button');btn.className='sug-btn';
        btn.innerHTML='<span style="flex:1">'+DAYS_FULL[d]+' '+(slot==='midi'?'Midi':'Soir')+'</span>'+
          (existing?'<span style="font-size:10px;color:var(--color-text-tertiary)">'+existing.name.slice(0,16)+'…</span>':'<span style="font-size:10px;color:var(--color-text-success)">libre</span>');
        btn.onclick=(()=>{const _wo=wo,_d=d,_s=slot;return()=>{
          const k='w'+_wo;if(!meals[k])meals[k]={};if(!meals[k][_d])meals[k][_d]={};
          meals[k][_d][_s]=pendingRecipe;
          // Ajouter aux courses seulement si checkbox cochée
          const addToCourses=document.getElementById('plan-cb-courses').checked;
          if(addToCourses&&!manualList.includes(pendingRecipe.id))manualList.push(pendingRecipe.id);
          closePlanModal();
          if(_wo===weekOffset)renderGrid();
          updateCoursesBadge();
        };})();
        body.appendChild(btn);
      }
    });
  }
  document.getElementById('modal-plan').classList.add('open');
}
function closePlanModal(){document.getElementById('modal-plan').classList.remove('open');pendingRecipe=null;}

document.getElementById('modal-plan').addEventListener('click',function(e){if(e.target===this)closePlanModal();});
document.getElementById('modal-recipe').addEventListener('click',function(e){if(e.target===this)closeRecipeModal();});
document.getElementById('modal-detail').addEventListener('click',function(e){if(e.target===this)closeDetailModal();});

// ── RECETTES ─────────────────────────────────────────────────────────────────
function setFilter(f,btn){
  recipeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderRecipes();
}
function filterRecipes(q){recipeSearch=q.toLowerCase();renderRecipes();}
function renderRecipes(){
  const grid=document.getElementById('recipe-grid');grid.innerHTML='';
  getAllRecipes().filter(r=>{
    const matchF=recipeFilter==='tous'||(recipeFilter==='thermomix'?r.thermomix:recipeFilter==='rapide'?r.time<25:r.tag===recipeFilter);
    const matchS=!recipeSearch||r.name.toLowerCase().includes(recipeSearch);
    return matchF&&matchS;
  }).forEach(r=>{
    const allIngs=Object.values(r.ings).flat().slice(0,3);
    const card=document.createElement('div');card.className='recipe-card';
    card.innerHTML=
      '<div class="rc-header">'+
        '<span class="rc-name">'+r.name+(r.custom?'<span class="custom-badge">perso</span>':'')+'</span>'+
        '<span class="meal-tag tag-'+r.tag+'">'+r.tagLabel+'</span>'+
      '</div>'+
      '<div class="rc-meta">'+
        '<span class="rc-time">'+r.time+' min</span>'+
        (r.thermomix?'<span class="rc-tm">TM6</span>':'')+
        (r.cookidoo?'<span class="rc-tm" style="background:var(--color-background-info);color:var(--color-text-info)">Cookidoo</span>':'')+
      '</div>'+
      '<div class="rc-ings">'+allIngs.join(' · ')+(Object.values(r.ings).flat().length>3?'…':'')+'</div>'+
      '<div class="rc-actions">'+
        '<button class="rc-btn" onclick="event.stopPropagation();openDetailModal('+r.id+')">Voir</button>'+
        '<button class="rc-btn-plan" onclick="event.stopPropagation();openPlanModal(getAllRecipes().find(x=>x.id==='+r.id+'))">+ Planifier</button>'+
        '<button class="rc-btn" onclick="event.stopPropagation();addToList('+r.id+')">+ Courses</button>'+
      '</div>';
    card.onclick=()=>openDetailModal(r.id);
    grid.appendChild(card);
  });
}

// ── AJOUT RECETTE MANUELLE ────────────────────────────────────────────────────
function toggleAddForm(){
  const form=document.getElementById('add-recipe-form');
  const visible=form.style.display!=='none';
  form.style.display=visible?'none':'block';
  document.getElementById('add-toggle-btn').textContent=visible?'+ Ajouter une recette':'✕ Annuler';
  if(visible)clearForm();
}
function clearForm(){
  ['f-name','f-time','f-cookidoo','f-ings','f-steps'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('f-error').style.display='none';
}
function saveNewRecipe(){
  const name=document.getElementById('f-name').value.trim();
  const tag=document.getElementById('f-tag').value;
  const time=parseInt(document.getElementById('f-time').value)||0;
  const tm=document.getElementById('f-tm').value==='1';
  const cookidooUrl=document.getElementById('f-cookidoo').value.trim()||null;
  const ingsRaw=document.getElementById('f-ings').value.trim();
  const stepsRaw=document.getElementById('f-steps').value.trim();
  const err=document.getElementById('f-error');
  if(!name){err.textContent='Le nom est obligatoire.';err.style.display='block';return;}
  if(!time||time<1){err.textContent='Indiquez un temps.';err.style.display='block';return;}
  if(!ingsRaw){err.textContent='Ajoutez au moins un ingrédient.';err.style.display='block';return;}
  err.style.display='none';
  const ingsLines=ingsRaw.split('\n').map(l=>l.trim()).filter(Boolean);
  const steps=stepsRaw?stepsRaw.split('\n').map(l=>l.trim()).filter(Boolean):[];
  customRecipes.push({id:nextId++,name,tag,tagLabel:TAG_LABELS[tag]||tag,time,thermomix:tm,cookidoo:cookidooUrl,ings:{epicerie:ingsLines},steps,custom:true});
  toggleAddForm();renderRecipes();
}

// ── COURSES ───────────────────────────────────────────────────────────────────
function setGroupMode(mode){
  groupMode=mode;
  document.getElementById('btn-group-cat').classList.toggle('active',mode==='cat');
  document.getElementById('btn-group-rec').classList.toggle('active',mode==='recette');
  renderCourses();
}

function getPlannedRecipes(){
  const ids=new Set();
  Object.values(meals).forEach(week=>{Object.values(week).forEach(day=>{Object.values(day).forEach(r=>{if(r&&r.id)ids.add(r.id);});});});
  return[...ids].map(id=>getAllRecipes().find(r=>r.id===id)).filter(Boolean);
}
function addToList(id){if(!manualList.includes(id))manualList.push(id);updateCoursesBadge();switchTab('courses');}

function getActiveRecipes(){
  const planned=getPlannedRecipes();
  const extra=manualList.map(id=>getAllRecipes().find(r=>r.id===id)).filter(Boolean);
  return[...planned,...extra.filter(r=>!planned.find(p=>p.id===r.id))];
}

function buildShoppingListByCat(){
  const all=getActiveRecipes();
  const merged={};
  all.forEach(r=>{
    Object.entries(r.ings).forEach(([cat,items])=>{
      if(!merged[cat])merged[cat]={};
      items.forEach(item=>{
        const parts=item.split(' — ');
        const name=parts[0].toLowerCase().trim();
        const qty=parts[1]||'';
        if(!merged[cat][name])merged[cat][name]=[];
        merged[cat][name].push(qty);
      });
    });
  });
  return merged;
}

function renderCourses(){
  const container=document.getElementById('courses-list');
  const all=getActiveRecipes();
  const totalIngs=all.reduce((s,r)=>s+Object.values(r.ings).flat().length,0);
  document.getElementById('courses-subtitle').textContent=
    all.length?totalIngs+' article'+(totalIngs>1?'s':'')+' · '+all.length+' recette'+(all.length>1?'s':''):'Aucun repas planifié';

  if(!all.length){container.innerHTML='<div class="empty-state">Planifiez des repas ou ajoutez des recettes aux courses pour générer la liste.</div>';return;}
  container.innerHTML='';

  if(groupMode==='cat'){
    // Par catégorie (comportement actuel)
    const list=buildShoppingListByCat();
    CAT_ORDER.forEach(cat=>{
      if(!list[cat])return;
      const sec=document.createElement('div');sec.className='cat-section';
      sec.innerHTML='<div class="cat-title">'+(CAT_LABELS[cat]||cat)+'</div>';
      Object.entries(list[cat]).forEach(([name,qtys])=>{
        sec.appendChild(makeCourseRow('cat_'+cat+'_'+name,name.charAt(0).toUpperCase()+name.slice(1),qtys.filter(Boolean).join(' + ')||''));
      });
      container.appendChild(sec);
    });
  } else {
    // Par recette
    all.forEach(r=>{
      const sec=document.createElement('div');sec.className='cat-section';
      sec.innerHTML='<div class="cat-title" style="display:flex;align-items:center;gap:6px">'+
        '<span class="meal-tag tag-'+r.tag+'" style="font-size:10px">'+r.tagLabel+'</span>'+
        r.name+'</div>';
      Object.values(r.ings).flat().forEach(item=>{
        const parts=item.split(' — ');
        const name=parts[0];
        const qty=parts[1]||'';
        sec.appendChild(makeCourseRow('rec_'+r.id+'_'+name.toLowerCase(),name,qty));
      });
      container.appendChild(sec);
    });
  }
}

function makeCourseRow(key,name,qty){
  const isChecked=checked[key]||false;
  const row=document.createElement('div');row.className='course-item';
  row.innerHTML=
    '<div class="course-check'+(isChecked?' checked':'')+'" onclick="toggleCheck(\''+key+'\',this)">'+(isChecked?'✓':'')+'</div>'+
    '<span class="course-name'+(isChecked?' checked':'')+'">'+name+'</span>'+
    '<span class="course-qty'+(isChecked?' checked':'')+'">'+qty+'</span>';
  return row;
}

function toggleCheck(key,el){
  checked[key]=!checked[key];
  el.classList.toggle('checked',checked[key]);
  el.textContent=checked[key]?'✓':'';
  el.nextElementSibling.classList.toggle('checked',checked[key]);
  el.nextElementSibling.nextElementSibling.classList.toggle('checked',checked[key]);
}
function clearChecked(){Object.keys(checked).forEach(k=>{if(checked[k])delete checked[k];});renderCourses();}
function resetCourses(){checked={};manualList=[];renderCourses();updateCoursesBadge();}
function updateCoursesBadge(){
  const n=getActiveRecipes().length;
  document.getElementById('courses-badge').textContent=n?'('+n+')':'';
}

renderGrid();
renderRecipes();
</script>
</body>
</html>
